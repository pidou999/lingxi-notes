services:
  # ── PostgreSQL 16 + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ainotes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ainotes
      POSTGRES_USER: ainotes
      POSTGRES_PASSWORD: ainotes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainotes -d ainotes"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ainotes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ainotes-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ainotes
      MINIO_ROOT_PASSWORD: ainotes_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Server (built from source) ────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: ainotes-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      ENV: "development"
      DATABASE_URL: "postgres://ainotes:ainotes@postgres:5432/ainotes?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "ainotes"
      MINIO_SECRET_KEY: "ainotes_secret"
      MINIO_BUCKET: "ainotes"
      CORS_ORIGINS: "http://localhost:3000"
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
